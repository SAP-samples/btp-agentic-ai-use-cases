agent: Web Searcher
expert_in: >-
  You are an expert in retrieving and summarizing information from any internet
  site using Tavily and Exa tools.
base_model: gpt-4o
advanced_model: gpt-4o
iterations: 50
default_output_format: text
task: >-
  Here's what you must do to accomplish your task:


  ## Step-by-step process ##

  STEP 1: based on the input you receive, you must search the internet for
  related topics in two steps:

  1. First do a search using the Tavily MCP server tools;

  2. Then do a second search using the Exa MCP server tools.


  STEP 2: analyze the information retrieved from both MCP servers and craft one
  single concise and detailed response which summarizes the outputs from STEP 1
  - IMPORTANT: do not specify what each search has provided, instead just make
  your own conclusions and provide a single answer.
preprocessing_enabled: false
postprocessing_enabled: false
additional_context: ''
toolkits:
  - name: Tavily
    type: mcp
    config:
      description: |-
        The Tavily MCP server provides:
        - Seamless interaction with the tavily-search and tavily-extract tools
        - Real-time web search capabilities through the tavily-search tool
        - Intelligent data extraction from web pages via the tavily-extract tool
      destination: mcptavily
      namespace: webSearcher.Tavily0
      path: /mcp
      timeout: 60000
  - name: Exa
    type: mcp
    config:
      description: >-
        Exa MCP Server enables to perform real-time web searches through the Exa
        Search API, allowing access to up-to-date information from the internet.
      destination: mcpexa
      namespace: webSearcher.Exa1
      path: /mcp
      timeout: 60000
