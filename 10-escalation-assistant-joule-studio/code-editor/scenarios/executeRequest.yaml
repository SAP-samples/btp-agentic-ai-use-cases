description: This skill is used to execute HTTP requests to any generic API.
target:
  type: function
  name: executeRequest
response_context:
  - value: response
    description: HTTP request response
slots:
  - name: method
    description: HTTP request method
  - name: path
    description: HTTP request path
  - name: body
    description: HTTP request body (for POST, PUT and PATCH methods)
  - name: destination
    description: Destination to configure the HTTP request
visibility_condition:
  objects:
    - type: ias_attributes
      attributes: []
